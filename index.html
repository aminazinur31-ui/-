<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalAI — Защита прав</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">LegalAI</div>
        <div class="history-label">История запросов</div>
        <div class="history-item">Отказ в возврате услуги</div>
        <div class="history-item">Брак электроники</div>
        <div class="history-item">Спор по подписке</div>
    </aside>

    <main class="main-content">
        <div class="glow-orb"></div>
        
        <header>
            <button class="btn-account">Личный кабинет</button>
        </header>

        <section class="hero">
            <h1>защитите свои <br> права за 3 минуты.</h1>
            
            <div class="chat-container">
                <div class="chat-prompt" id="typing-text"></div>
                
                <div class="action-row">
                    <div class="features-pill">
                        <span class="pill">Анализ ситуации</span>
                        <span class="pill">Генерация претензии</span>
                    </div>
                    <button class="btn-query" id="main-btn">Получить решение →</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const fullText = "Я оплатил услугу, но компания отказалась возвращать деньги после отмены. Помогите мне разобраться в этой ситуации как профессиональный юрист. Какие у меня есть права?";
        const typingElement = document.getElementById("typing-text");
        let i = 0;

        function typeWriter() {
            if (i < fullText.length) {
                typingElement.innerHTML += fullText.charAt(i);
                i++;
                setTimeout(typeWriter, 30); // Скорость печати
            }
        }

        // Запуск при загрузке
        window.onload = function() {
            typingElement.innerHTML = "";
            setTimeout(typeWriter, 500);
        };

        // Логика кнопки
        document.getElementById('main-btn').onclick = function() {
            this.innerText = 'Анализирую...';
            this.style.opacity = '0.7';
            setTimeout(() => {
                alert('ИИ-юрист сформировал план действий!');
                this.innerText = 'Получить решение →';
                this.style.opacity = '1';
            }, 2000);
        };
    </script>
</body>
</html>
