    <script>
        const promptText = "Я оплатил услугу, но компания отказалась возвращать деньги после отмены. Помогите мне разобраться в этой ситуации как профессиональный юрист. Какие у меня есть права?";
        const box = document.getElementById("typing-area");
        let i = 0;

        function typing() {
            if (i < promptText.length) {
                box.textContent += promptText.charAt(i);
                i++;
                setTimeout(typing, 30);
            }
        }

        window.onload = () => {
            box.textContent = "";
            setTimeout(typing, 1000);
        };

        // КЛИК С ОТПРАВКОЙ ЦЕЛИ В ЯНДЕКС

            this.style.opacity = "0.5";

                alert("Юридический отчет готов. Переходим в личный кабинет.");
                this.textContent = "ПОЛУЧИТЬ РЕШЕНИЕ";
                this.style.opacity = "1";
            }, 1500);
        };
