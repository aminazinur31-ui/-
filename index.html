        /* SIDEBAR */

            display: flex;
            flex-direction: column;

        .logo { font-weight: 800; font-size: 18px; margin-bottom: 50px; display: flex; align-items: center; gap: 8px; }
        .logo-box { width: 12px; height: 12px; background: #fff; border-radius: 2px; }

        .menu-label { font-size: 10px; color: var(--gray); font-weight: 700; letter-spacing: 1px; margin-bottom: 20px; }

        .nav-item:hover { color: #fff; }

        /* MAIN AREA */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at top right, #111111, transparent);

        .top-btn { position: absolute; top: 30px; right: 40px; }
        .btn-outline {
            background: transparent; border: 1px solid var(--border); color: #fff;
            padding: 8px 20px; border-radius: 100px; font-size: 12px; cursor: pointer;
        }

        h1 {
            font-size: clamp(40px, 8vw, 75px);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.85;
            text-align: center;
            margin-bottom: 50px;
            text-transform: lowercase;
        }

        /* CHAT INTERFACE */
        .chat-container {
            width: 90%;
            max-width: 650px;
            background: #080808;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
        }

        #typing-box {
            font-size: 18px;
            line-height: 1.6;
            min-height: 100px;
            margin-bottom: 30px;
            color: #efefef;
        }
        
        #typing-box::after { content: '_'; animation: cursor 1s infinite; color: var(--accent); }

        .chat-actions { display: flex; justify-content: space-between; align-items: center; }
        .status-tag { font-size: 10px; color: var(--gray); font-weight: 700; }

        .btn-white {
            background: #fff; color: #000; border: none; padding: 14px 30px;
            border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-white:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

    <main class="main">
        <div class="top-btn"><button class="btn-outline">Account</button></div>
        
        <h1>защитите свои <br> права за 3 минуты.</h1>

        <div class="chat-container">
            <div id="typing-box"></div>
            <div class="chat-actions">
                <div class="status-tag">YANDEX METRIKA: 107738375</div>
                <button class="btn-white" id="solve-btn">ПОЛУЧИТЬ РЕШЕНИЕ</button>
            </div>
        </div>
    </main>

    <script>
        const phrase = "Я оплатил услугу, но компания отказалась возвращать деньги после отмены. Помогите мне разобраться в этой ситуации как профессиональный юрист. Какие у меня есть права?";
        const box = document.getElementById("typing-box");
        let i = 0;

        function type() {
            if (i < phrase.length) {
                box.textContent += phrase.charAt(i);
                i++;
                setTimeout(type, 30);
            }
        }

        window.onload = () => {
            box.textContent = "";
            setTimeout(type, 1000);
        };

        // Логика кнопки + цель Метрики
        document.getElementById('solve-btn').onclick = function() {
            // Отправка цели в Метрику (ID обновлен)
            if (typeof ym !== 'undefined') {
                ym(107738375, 'reachGoal', 'get_solution');
            }

            this.textContent = "АНАЛИЗИРУЮ...";
            this.style.opacity = "0.5";
            
            setTimeout(() => {
                alert("Анализ завершен. Результаты в Личном Кабинете.");
                this.textContent = "ПОЛУЧИТЬ РЕШЕНИЕ";
                this.style.opacity = "1";
            }, 1800);
        };
    </script>
