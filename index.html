<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lexora Law AI Chat</title>
    <meta
      name="description"
      content="Lexora Law AI chat for legal intake, document analysis, and attorney-reviewed drafts."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <a class="brand" href="#" aria-label="Lexora Law" id="homeButton">
            <span class="brand-mark">L</span>
            <span>
              <strong>Lexora Law</strong>
              <small>AI Legal Chat</small>
            </span>
          </a>

          <button class="sidebar-action" type="button" id="newChatButton">
            Новый чат
          </button>
        </div>

        <section class="sidebar-section">
          <p class="sidebar-label">Диалоги</p>
          <div class="thread-list">
            <button class="thread-item is-active" type="button" data-thread="new-request">
              <strong>Новый юридический запрос</strong>
              <span>Первичный разбор</span>
            </button>
            <button class="thread-item" type="button" data-thread="contract-review">
              <strong>Проверка договора</strong>
              <span>Риски и правки</span>
            </button>
            <button class="thread-item" type="button" data-thread="claim-strategy">
              <strong>Претензия контрагенту</strong>
              <span>Досудебный шаг</span>
            </button>
          </div>
        </section>

        <section class="sidebar-section">
          <p class="sidebar-label">Сценарии</p>
          <div class="mini-tags">
            <button type="button" class="mini-tag-button" data-template="employment">Консультация</button>
            <button type="button" class="mini-tag-button" data-template="contract">Договоры</button>
            <button type="button" class="mini-tag-button" data-template="debt">Претензии</button>
            <button type="button" class="mini-tag-button" data-template="compliance">Комплаенс</button>
          </div>
        </section>
      </aside>

      <main class="chat-shell">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Lexora</p>
            <h1>Юридический чат</h1>
          </div>

          <div class="header-controls">
            <label class="select-field">
              <span>Сценарий</span>
              <select id="scenario" name="scenario">
                <option value="consultation">Первичная консультация</option>
                <option value="contract">Анализ договора</option>
                <option value="claim">Претензия / иск</option>
                <option value="business">Бизнес и комплаенс</option>
              </select>
            </label>

            <label class="select-field">
              <span>Юрисдикция</span>
              <select id="jurisdiction" name="jurisdiction">
                <option value="Казахстан">Казахстан</option>
                <option value="Международная сделка">Международная сделка</option>
                <option value="Россия / СНГ">Россия / СНГ</option>
                <option value="Не знаю">Не знаю</option>
              </select>
            </label>
          </div>
        </header>

        <section class="chat-thread" id="chatThread" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">L</div>
            <div class="bubble">
              <p class="message-role">Lexora AI</p>
              <h2>Опишите ситуацию</h2>
              <div class="starter-grid">
                <button class="starter-card" type="button" data-template="contract">
                  <strong>Проверить договор</strong>
                </button>
                <button class="starter-card" type="button" data-template="debt">
                  <strong>Взыскать задолженность</strong>
                </button>
                <button class="starter-card" type="button" data-template="employment">
                  <strong>Трудовой спор</strong>
                </button>
                <button class="starter-card" type="button" data-template="compliance">
                  <strong>Комплаенс</strong>
                </button>
              </div>
            </div>
          </article>
        </section>

        <footer class="composer-shell">
          <div class="context-row">
            <button class="context-chip" type="button" data-template="contract">Договор</button>
            <button class="context-chip" type="button" data-template="debt">Задолженность</button>
            <button class="context-chip" type="button" data-template="employment">Трудовой спор</button>
            <button class="context-chip" type="button" data-template="compliance">Комплаенс</button>
          </div>

          <form class="composer" id="chatForm">
            <textarea
              id="request"
              name="request"
              rows="1"
              placeholder="Опишите кейс, приложите факты, даты, суммы, документы, цель обращения..."
            ></textarea>
            <div class="composer-actions">
              <p id="statusText">Черновик с проверкой юриста.</p>
              <div class="action-group">
                <button class="ghost-button" type="button" id="resetButton">Очистить</button>
                <button class="send-button" type="submit" id="sendButton">Отправить</button>
              </div>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
