<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalAI — Premium Justice</title>
    <style>
        /* === УПЕРТЫЙ ДИЗАЙН (PREMIUM DARK) === */
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --text-gray: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* БОКОВОЕ МЕНЮ (SIDEBAR) */
        .sidebar {
            width: 260px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            background: #000;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

        .menu-group { margin-bottom: 32px; }
        .menu-label { font-size: 10px; color: var(--text-gray); font-weight: 700; letter-spacing: 1.5px; margin-bottom: 20px; text-transform: uppercase; }

        .nav-link {
            font-size: 13px;
            color: #999;
            padding: 10px 0;
            cursor: pointer;
            transition: 0.2s;
            display: block;
            text-decoration: none;
        }
        .nav-link:hover { color: #fff; }

        /* ГЛАВНЫЙ ЭКРАН */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        /* Кнопка ЛК сверху */
        .top-bar {
            position: absolute;
            top: 40px;
            right: 60px;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-ghost:hover { border-color: #fff; }

        /* ТИПОГРАФИКА (HALO STYLE) */
        .hero-title {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.85;
            text-align: center;
            margin-bottom: 60px;
            text-transform: lowercase; /* Упертый стиль */
        }

        /* ИНТЕРФЕЙС ЧАТА */
        .chat-wrap {
            width: 100%;
            max-width: 680px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            position: relative;
        }

        #typing-area {
            font-size: 18px;
            line-height: 1.6;
            color: #fff;
            min-height: 100px;
            margin-bottom: 40px;
        }

        /* Мигающий курсор */
        #typing-area::after {
            content: '_';
            animation: blink 1s infinite;
            color: var(--accent);
        }

        .chat-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-main {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 36px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-main:hover { transform: scale(1.02); background: #f0f0f0; }

        @keyframes blink { 50% { opacity: 0; } }

        /* Мобильная версия */
        @media (max-width: 800px) {
            .sidebar { display: none; }
            .hero-title { font-size: 48px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><div class="logo-dot"></div> LegalAI</div>
        
        <div class="menu-group">
            <div class="menu-label">История</div>
            <a class="nav-link">Отказ в возврате</a>
            <a class="nav-link">Брак электроники</a>
            <a class="nav-link">Претензия к курсу</a>
        </div>

        <div class="menu-group" style="margin-top: auto;">
            <a class="nav-link" style="color: var(--accent);">+ Создать новый запрос</a>
        </div>
    </aside>

    <main class="viewport">
        <div class="top-bar">
            <button class="btn-ghost">Личный кабинет</button>
        </div>

        <h1 class="hero-title">защитите свои <br> права за 3 минуты.</h1>

        <div class="chat-wrap">
            <div id="typing-area"></div>
            
            <div class="chat-footer">
                <div style="color: var(--text-gray); font-size: 11px; font-weight: 600;">STATUS: READY TO ANALYZE</div>
                <button class="btn-main" id="startBtn">ПОЛУЧИТЬ РЕШЕНИЕ</button>
            </div>
        </div>
    </main>

    <script>
        const promptText = "Я оплатил услугу, но компания отказалась возвращать деньги после отмены. Помогите мне разобраться в этой ситуации как профессиональный юрист. Какие у меня есть права?";
        const box = document.getElementById("typing-area");
        let i = 0;

        function typing() {
            if (i < promptText.length) {
                box.textContent += promptText.charAt(i);
                i++;
                setTimeout(typing, 30);
            }
        }

        // Старт при загрузке
        window.onload = () => {
            box.textContent = "";
            setTimeout(typing, 1000);
        };

        // Обработка кнопки
        document.getElementById('startBtn').onclick = function() {
            this.textContent = "АНАЛИЗ...";
            this.style.opacity = "0.5";
            setTimeout(() => {
                alert("Юридический отчет готов. Переходим в личный кабинет.");
                this.textContent = "ПОЛУЧИТЬ РЕШЕНИЕ";
                this.style.opacity = "1";
            }, 2000);
        };
    </script>
</body>
</html>
